# Console / logging
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Hardware needed by the DW3000 driver
CONFIG_SPI=y
CONFIG_GPIO=y

# br101's DW3000 driver — DW3110 is the DW3000 family
CONFIG_DW3000=y
CONFIG_DW3000_CHIP_DW3000=y

# Comfortable main stack
CONFIG_MAIN_STACK_SIZE=4096
